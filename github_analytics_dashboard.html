<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #141829;
            --bg-tertiary: #1a1f3a;
            --border-color: #2a3550;
            --text-primary: #e4e6eb;
            --text-secondary: #a8aec4;
            --accent: #00d4ff;
            --accent-secondary: #ff6b6b;
            --accent-tertiary: #4ecdc4;
        }

        body {
            background: linear-gradient(135deg, var(--bg-primary) 0%, #0f1436 100%);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent-tertiary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .input-section {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .input-section input {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            width: 250px;
            transition: all 0.3s ease;
        }

        .input-section input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--bg-tertiary);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .input-section button {
            padding: 12px 28px;
            background: linear-gradient(135deg, var(--accent), var(--accent-tertiary));
            border: none;
            border-radius: 8px;
            color: var(--bg-primary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .input-section button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3);
        }

        .input-section button:active {
            transform: translateY(0);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 212, 255, 0.15);
        }

        .stat-card h3 {
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-card .subtitle {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .chart-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            position: relative;
        }

        .chart-card h2 {
            font-size: 16px;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .error {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid var(--accent-secondary);
            border-radius: 8px;
            padding: 16px;
            color: var(--accent-secondary);
            margin-bottom: 20px;
            text-align: center;
        }

        .success {
            background: rgba(78, 205, 196, 0.1);
            border: 1px solid var(--accent-tertiary);
            border-radius: 8px;
            padding: 16px;
            color: var(--accent-tertiary);
            margin-bottom: 20px;
            text-align: center;
        }

        .user-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .user-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            object-fit: cover;
        }

        .user-details h2 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .user-details p {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 4px;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 24px;
            }

            .input-section input {
                width: 100%;
            }
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 212, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 GitHub Analytics Dashboard</h1>
            <p>تحليل إحصائيات حسابك على GitHub</p>
        </div>

        <div class="input-section">
            <input type="text" id="username" placeholder="أدخل username GitHub...">
            <button onclick="fetchData()">تحليل الآن</button>
        </div>

        <div id="message"></div>
        <div id="userInfo"></div>
        <div id="statsContainer"></div>
        <div id="chartsContainer"></div>
    </div>

    <script>
        const API_BASE = 'https://api.github.com';

        async function fetchData() {
            const username = document.getElementById('username').value.trim();
            const messageDiv = document.getElementById('message');

            if (!username) {
                messageDiv.innerHTML = '<div class="error">⚠️ الرجاء إدخال username</div>';
                return;
            }

            messageDiv.innerHTML = '<div class="loading"><div class="spinner"></div> جاري التحليل...</div>';

            try {
                // Fetch User Data
                const userRes = await fetch(`${API_BASE}/users/${username}`);
                if (!userRes.ok) throw new Error('المستخدم غير موجود');
                const userData = await userRes.json();

                // Fetch Repos
                const reposRes = await fetch(`${API_BASE}/users/${username}/repos?per_page=100`);
                const repos = await reposRes.json();

                // Fetch Events (Commits)
                const eventsRes = await fetch(`${API_BASE}/users/${username}/events/public?per_page=100`);
                const events = await eventsRes.json();

                messageDiv.innerHTML = '<div class="success">✅ تم تحميل البيانات بنجاح</div>';

                displayUserInfo(userData);
                displayStats(userData, repos, events);
                displayCharts(repos, events);

            } catch (error) {
                messageDiv.innerHTML = `<div class="error">❌ خطأ: ${error.message}</div>`;
            }
        }

        function displayUserInfo(user) {
            const userInfoDiv = document.getElementById('userInfo');
            userInfoDiv.innerHTML = `
                <div class="user-card">
                    <img src="${user.avatar_url}" alt="${user.name}" class="user-avatar">
                    <div class="user-details">
                        <h2>${user.name || user.login}</h2>
                        <p>@${user.login}</p>
                        <p>${user.bio || 'لا توجد سيرة ذاتية'}</p>
                        <p>📍 ${user.location || 'غير محدد'}</p>
                    </div>
                </div>
            `;
        }

        function displayStats(user, repos, events) {
            const languages = {};
            repos.forEach(repo => {
                if (repo.language) {
                    languages[repo.language] = (languages[repo.language] || 0) + 1;
                }
            });

            const topLanguages = Object.entries(languages)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3)
                .map(([lang]) => lang)
                .join(', ');

            const statsDiv = document.getElementById('statsContainer');
            statsDiv.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>المشاريع</h3>
                        <div class="value">${repos.length}</div>
                        <div class="subtitle">عدد المشاريع على GitHub</div>
                    </div>
                    <div class="stat-card">
                        <h3>المتابعون</h3>
                        <div class="value">${user.followers}</div>
                        <div class="subtitle">عدد المتابعين</div>
                    </div>
                    <div class="stat-card">
                        <h3>متابع</h3>
                        <div class="value">${user.following}</div>
                        <div class="subtitle">عدد الأشخاص المتابعين</div>
                    </div>
                    <div class="stat-card">
                        <h3>النجوم</h3>
                        <div class="value">${repos.reduce((sum, r) => sum + r.stargazers_count, 0)}</div>
                        <div class="subtitle">إجمالي النجوم</div>
                    </div>
                    <div class="stat-card">
                        <h3>اللغات</h3>
                        <div class="value">${Object.keys(languages).length}</div>
                        <div class="subtitle">${topLanguages}</div>
                    </div>
                    <div class="stat-card">
                        <h3>النشاط</h3>
                        <div class="value">${events.length}</div>
                        <div class="subtitle">الأحداث الأخيرة</div>
                    </div>
                </div>
            `;
        }

        function displayCharts(repos, events) {
            const chartsDiv = document.getElementById('chartsContainer');

            // Languages Chart
            const languages = {};
            repos.forEach(repo => {
                if (repo.language) {
                    languages[repo.language] = (languages[repo.language] || 0) + 1;
                }
            });

            // Activity Chart
            const activityByDay = {};
            events.forEach(event => {
                const date = new Date(event.created_at).toLocaleDateString('ar-IQ');
                activityByDay[date] = (activityByDay[date] || 0) + 1;
            });

            // Stars Chart
            const topRepos = repos
                .sort((a, b) => b.stargazers_count - a.stargazers_count)
                .slice(0, 8);

            chartsDiv.innerHTML = `
                <div class="charts-grid">
                    <div class="chart-card">
                        <h2>📚 اللغات المستخدمة</h2>
                        <div class="chart-container">
                            <canvas id="languagesChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-card">
                        <h2>🌟 أفضل المشاريع ن��وماً</h2>
                        <div class="chart-container">
                            <canvas id="starsChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-card">
                        <h2>📊 النشاط الأخير</h2>
                        <div class="chart-container">
                            <canvas id="activityChart"></canvas>
                        </div>
                    </div>
                </div>
            `;

            // Charts
            setTimeout(() => {
                createLanguagesChart(languages);
                createStarsChart(topRepos);
                createActivityChart(activityByDay);
            }, 100);
        }

        function createLanguagesChart(languages) {
            const ctx = document.getElementById('languagesChart');
            if (!ctx) return;

            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(languages),
                    datasets: [{
                        data: Object.values(languages),
                        backgroundColor: [
                            '#00d4ff',
                            '#ff6b6b',
                            '#4ecdc4',
                            '#ffe66d',
                            '#a8e6cf',
                            '#ffd3b6'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#a8aec4' }
                        }
                    }
                }
            });
        }

        function createStarsChart(repos) {
            const ctx = document.getElementById('starsChart');
            if (!ctx) return;

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: repos.map(r => r.name.substring(0, 15)),
                    datasets: [{
                        label: 'النجوم',
                        data: repos.map(r => r.stargazers_count),
                        backgroundColor: '#4ecdc4',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y',
                    plugins: {
                        legend: { labels: { color: '#a8aec4' } }
                    },
                    scales: {
                        x: { ticks: { color: '#a8aec4' } },
                        y: { ticks: { color: '#a8aec4' } }
                    }
                }
            });
        }

        function createActivityChart(activityByDay) {
            const ctx = document.getElementById('activityChart');
            if (!ctx) return;

            const dates = Object.keys(activityByDay).slice(-10);
            const counts = dates.map(d => activityByDay[d]);

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: 'النشاط',
                        data: counts,
                        borderColor: '#00d4ff',
                        backgroundColor: 'rgba(0, 212, 255, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#a8aec4' } }
                    },
                    scales: {
                        x: { ticks: { color: '#a8aec4' } },
                        y: { ticks: { color: '#a8aec4' } }
                    }
                }
            });
        }

        // Auto-fill if GitHub username in URL
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const user = params.get('user');
            if (user) {
                document.getElementById('username').value = user;
                fetchData();
            }
        });
    </script>
</body>
</html>
